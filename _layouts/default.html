<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <!-- Minimalist, beautiful CSS framework -->
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura.css" type="text/css">
    <style>
        body {
            max-width: 800px;
            max-width: 150rem;
        }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .col {
            flex: 1;
            min-width: 300px;
        }

        .hero-img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .cta-btn {
            background-color: #059669;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .cta-btn:hover {
            background-color: #047857;
            color: white;
        }

        .price {
            font-size: 1.5em;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
        }

        footer {
            margin-top: 50px;
            padding: 20px 0;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 0.9em;
            color: #666;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0369a1;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <header>
        <h1>{{site.logo}}{{ site.title }}</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/products/acro-wedge/">Acro Wedge</a>
            <a href="/products/wrist-wraps/">Wrist Wraps</a>
            <a href="/products/handstand-canes/">Handstand Canes</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ "now" | date: "%Y" }} {{ site.title }}. Made with ❤️ in Canada. All rights reserved.</p>
    </footer>

</body>

</html>
